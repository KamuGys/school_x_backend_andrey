services:
  app:
    build: .
    container_name: school_x_app
    ports:
      - "8000:8000"
    environment:
      APP_VERSION: "2.0.0"
      ENVIRONMENT: "dev"
      DATABASE_URL: "sqlite+aiosqlite:///./db.sqlite"
      SECRET_KEY: "SECRET"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "task-avatars"
      MINIO_SECURE: "false"
    volumes:
      - ./db.sqlite:/app/db.sqlite
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: school_x_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - minio_data:/data

volumes:
  minio_data: 